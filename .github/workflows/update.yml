name: Update leaderboard

on:
  schedule:
    # GitHub's schedule trigger is unreliable for short intervals on free
    # public repos; the real driver is cron-job.org hitting the
    # sync-worker on Cloudflare every 5 min. This schedule acts as a
    # coarse fallback if the external pinger goes down.
    - cron: "*/30 13-23 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "live.py"
      - "entrants.json"
      - ".github/workflows/update.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate site
        run: python3 live.py --site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - id: deployment
        uses: actions/deploy-pages@v4
